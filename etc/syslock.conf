# Sample syslock.conf
# The immutable-flag config line is optional. Default behavior is
# schg for BSD, uchg for macOS (schg is equivalent on Apple Silicon,
# where there is no single-user mode) and +i (only supported option)
# for Linux.
# immutable-flag: [schg|uchg|+i]
# schg is system immutability flag and requires securelevel=0 (single
# user mode) to unlock.
#
# Optionally groups of pathnames can be identified with a
# group: <groups>
# line in front of them. Group names can be alphanumeric plus hyphens,
# separated by spaces.
#
# If immutable-flag: schg is used, a group name "uchg" can be used for
# files that are locked and unlocked with the uchg flag at any time
# with syslock -g uchg/sysunlock -g uchg.
# If the "uchg" group is added alongside other groups, you can lock and
# unlock only the files in the intersection of "uchg" and another group
# using syslock -g group:uchg/sysunlock -g group:uchg.
# If the "uappnd" group is added alongside other groups, you can set
# and reset the append-only flag similarly; if groups are defined
# that are *only* alongside "uappnd", then ":uappnd" need not be explicit.
# (For Linux, this is "+a" instead of "uappnd".)
#
# If immutable-flag: uchg is used, a group name "schg" can be used for
# files that are locked and unlocked with the schg flag--unlocked only
# in single-user mode--with syslock -g schg/sysunlock -g schg.
# sysunlock with no args in such a case will skip over anything in the
# schg group if not in single-user mode.
#
# Flags in front of a directory file path:
# + Do not recurse through subdirectories.
# - Do not lock a directory itself, just its contents.
# = Lock a directory and its file contents, but not subdirectories.
# ! If the -s option to syslock/sysunlock is used, only lock/unlock these items.
#    This allows syslock -s to be put in rc.securelevel, and sysunlock -s to be performed after shutdown.
# ! is in front of /usr/lib to permit libc.so reordering (OpenBSD 6.0+).

# The presecure group are files that, if unlocked, could be modified to
# either execute commands prior to securelevel being raised to 1 or
# prevent securelevel from being raised to 1 on a reboot.
# /etc/fstab and /etc/ttys are accessed before securelevel is raised to 1
# but aren't "presecure" under this narrower definition.
# It's recommended to use schg for presecure group files if uchg is
# used as default, main tradeoff is you must go to single-user mode
# and unlock for any patching that touches the kernel, /sbin, or /bin,
# or installs rc scripts.
# Always unlock everything (or at least "system") before doing an
# upgrade.

# Sample file list for OpenBSD.

# /etc
# use schg group for presecure if uchg is default
group: etc configs system rc-scripts presecure
/etc/rc.conf.local
/etc/rc.d

group: etc configs system
/etc/changelist
/etc/daily.local
/etc/dhcpd.conf
/etc/monthly.local
/etc/rc.shutdown
/etc/syslock.conf
/etc/weekly.local

# doas.conf
group: etc configs doas system
/etc/doas.conf

# don't unlock unless you need to - use schg group if uchg is default
group: fstab configs system
/etc/fstab

# /etc rarely unlocked - use schg group for presecure if uchg is default
group: etcrare configs system presecure
# touch an empty /etc/boot.conf if it doesn't exist
/etc/boot.conf
/etc/hostname.*
/etc/netstart
/etc/rc
/etc/rc.conf
/etc/rc.local
/etc/rc.securelevel
/etc/sysctl.conf

# /etc rarely unlocked - could use schg group if uchg is default
group: etcrare configs system
/etc/daily
/etc/disktab
/etc/fbtab
/etc/gettytab
/etc/hosts
/etc/login.conf
/etc/login.conf.d
/etc/monthly
/etc/newsyslog.conf
/etc/ntpd.conf
/etc/protocols
/etc/services
/etc/syslog.conf
/etc/ttys
/etc/weekly
/etc/mtree/special

group: etc configs mail system
/etc/mail/smtpd.conf

# pf
group: etc configs pf system
/etc/pf.conf
#/etc/pf.os

# reportnew
#group: etc configs reportnew
#/etc/reportnew/reportnew.conf

# rsync
#group: etc configs rsync
#/etc/rsync/rsync.conf

# could use schg group if uchg is default
group: etcrare signify system
/etc/signify

# sigtree
#group: etc configs sigtree
#/etc/<hostname>.sigtree.conf

group: etc ssh system
/etc/ssh

group: etcrare ssl system
/etc/ssl

#group: var configs dns system
#/var/nsd/etc/nsd.conf
#/var/unbound/etc/unbound.conf

# Binaries and libraries.
# omit /bin and /sbin if they're symlinks
# use schg group for presecure if uchg is default
group: binaries system presecure
/bin
/sbin

group: binaries system
!/usr/bin
!/usr/sbin

group: binaries libraries system
!/usr/libexec
!/usr/lib
/usr/libdata
!/usr/share/relink/usr

group: binaries local
/usr/local/bin
/usr/local/sbin

group: binaries libraries local
/usr/local/libexec
/usr/local/lib
/usr/local/libdata

# Kernel.
# use schg group for presecure if uchg is default
group: binaries kernel system presecure
!/bsd
# lock /obsd if it exists, uncomment
#!/obsd
!/usr/share/relink/kernel

# Boot loader files. Worth locking to prevent staging a modified
# bootloader, but changes would only take effect after running
# installboot as root in single-user mode, modifying these files
# alone won't affect the next boot and so these aren't in the
# presecure group.
group: binaries boot system
/usr/mdec

# Process account logs. Append-only for live log, rest immutable.
# (Use uchg only for these, or you can't do log rotation.)
# Must be unlocked before rotation and relocked afterward.
# Easiest way on OpenBSD is to add two lines at the end of your
# daily.local:
# /usr/local/bin/sysunlock -g acct
# echo "/usr/local/bin/syslock -g acct" | /usr/bin/at now + 5 minutes
group: uappnd acct acct-logs
/var/account/acct
group: uchg acct acct-logs
/var/account/acct.*
/var/account/savacct
/var/account/usracct

# newsyslog rotated logs.
# Add sysunlock -g newsyslog-logs before and
# syslock -g newsyslog-logs after the crontab invocation of newsyslog
group: uappnd newsyslog-logs
/var/cron/log
/var/log/authlog
/var/log/daemon
/var/log/maillog
/var/log/messages
/var/log/secure
/var/www/logs/access.log
/var/www/logs/error.log

group: uchg newsyslog-logs
/var/cron/log.*.gz
/var/log/authlog.*.gz
/var/log/daemon.*.gz
/var/log/maillog.*.gz
/var/log/messages.*.gz
/var/log/secure.*.gz
/var/www/logs/access.log.*.gz
/var/www/logs/error.log.*.gz
